<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>LifeOS — Design Prototype</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF8F4">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ============================================================
   LifeOS design language
   paper & stone surfaces · charcoal ink · deep blue / sage / amber
   editorial serif titles · quiet sans body · hairlines · calm motion
   ============================================================ */
:root{
  --paper:   #FAF8F4;   /* warm off-white page */
  --card:    #FFFFFF;
  --stone:   #F1EEE7;   /* soft stone fill */
  --stone-2: #EAE6DD;
  --ink:     #23211C;   /* charcoal */
  --ink-2:   #5E5A50;   /* secondary */
  --mut:     #8F8A7D;   /* muted slate-warm */
  --faint:   #B4AFA2;
  --line:    #E8E4DA;   /* thin separators */
  --blue:    #33527B;   /* deep blue accent */
  --blue-ink:#2A4364;
  --sage:    #6E7F63;   /* soft sage */
  --sage-bg: #EEF0E9;
  --amber:   #A9762B;   /* warm amber */
  --amber-bg:#F5EEDF;
  --blue-bg: #EBEFF4;
  --shadow: 0 1px 2px rgba(35,33,28,.04), 0 10px 30px rgba(35,33,28,.06);
  --shadow-soft: 0 1px 2px rgba(35,33,28,.03), 0 4px 14px rgba(35,33,28,.04);
  --serif: "New York", ui-serif, Georgia, "Times New Roman", serif;
  --sans: -apple-system, system-ui, "SF Pro Text", "Segoe UI", sans-serif;
  --r: 16px;
  --ease: cubic-bezier(.32,.72,.28,1);
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{
  background:#EFECE5;
  font-family:var(--sans);
  color:var(--ink);
  font-size:15.5px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
/* phone shell — full-bleed on mobile, framed on larger screens */
.phone{
  position:relative;
  max-width:430px; margin:0 auto; min-height:100dvh;
  background:var(--paper);
  display:flex; flex-direction:column;
  overflow:hidden;
}
@media (min-width:560px){
  body{ padding:36px 0; }
  .phone{
    min-height:0; height:880px; border-radius:48px;
    box-shadow:0 2px 4px rgba(35,33,28,.08), 0 40px 90px rgba(35,33,28,.18);
    outline:10px solid #22201c;
  }
}
/* status bar */
.statusbar{
  flex:0 0 auto; display:flex; justify-content:space-between; align-items:center;
  padding:14px 26px 4px; font-size:14px; font-weight:600; letter-spacing:.01em;
  color:var(--ink); background:var(--paper); z-index:40;
}
.statusbar svg{ height:12px; display:block; }
/* scroll region */
.stage{ flex:1; position:relative; overflow:hidden; }
.screen{
  position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;
  padding:6px 20px 120px;
  opacity:0; pointer-events:none; transform:translateY(6px);
  transition:opacity .28s var(--ease), transform .28s var(--ease);
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{ display:none; }
.screen.on{ opacity:1; pointer-events:auto; transform:none; }
/* pushed detail screens */
.screen.push{ background:var(--paper); z-index:30; transform:translateX(26px); }
.screen.push.on{ transform:none; }

/* ---------- typography ---------- */
.overline{
  font-size:12.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
  color:var(--mut);
}
h1.editorial{
  font-family:var(--serif); font-weight:600; letter-spacing:-.01em;
  font-size:34px; line-height:1.15; margin:2px 0 0;
}
.pagehead{ padding:18px 2px 6px; }
.pagehead .sub{ color:var(--ink-2); font-size:15px; margin-top:6px; }
.sectionlabel{
  font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--mut); margin:26px 2px 10px; display:flex; justify-content:space-between; align-items:baseline;
}
.sectionlabel .quiet-link{ font-size:13px; font-weight:500; letter-spacing:0; text-transform:none; color:var(--blue); cursor:pointer; }

/* ---------- cards ---------- */
.card{
  background:var(--card); border-radius:var(--r);
  box-shadow:var(--shadow-soft); border:1px solid rgba(35,33,28,.04);
  padding:18px;
}
.card + .card{ margin-top:10px; }
.brief{
  font-family:var(--serif); font-size:17.5px; line-height:1.62; color:var(--ink);
  padding:20px;
}
.brief .lede{ display:block; }
.brief-tag{ display:flex; align-items:center; gap:7px; margin-bottom:10px; }
.brief-tag .spark{ width:14px; height:14px; color:var(--amber); }
.brief-tag span{ font-family:var(--sans); font-size:12.5px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--mut); }

/* ---------- header meta row (weather / energy) ---------- */
.meta-row{ display:flex; gap:8px; margin-top:14px; }
.meta-chip{
  display:flex; align-items:center; gap:8px;
  background:var(--card); border:1px solid rgba(35,33,28,.05); box-shadow:var(--shadow-soft);
  border-radius:999px; padding:8px 14px 8px 10px; font-size:13.5px; color:var(--ink-2); font-weight:500; white-space:nowrap;
}
.meta-chip svg{ width:17px; height:17px; color:var(--amber); }
.meta-chip b{ color:var(--ink); font-weight:600; }
.meta-chip .ring{
  width:20px; height:20px; border-radius:50%;
  background:conic-gradient(var(--sage) 0 82%, var(--stone-2) 82% 100%);
  display:flex; align-items:center; justify-content:center;
}
.meta-chip .ring i{ width:12px; height:12px; border-radius:50%; background:var(--card); }

/* ---------- priorities ---------- */
.prio{ display:flex; align-items:center; gap:14px; padding:15px 16px; cursor:pointer; }
.prio + .prio{ border-top:1px solid var(--line); }
.prio .tick{
  flex:0 0 26px; width:26px; height:26px; border-radius:50%;
  border:1.5px solid var(--faint); transition:all .25s var(--ease);
  display:flex; align-items:center; justify-content:center; color:transparent;
}
.prio.done .tick{ background:var(--sage); border-color:var(--sage); color:#fff; }
.prio .p-title{ font-weight:590; font-size:15.5px; letter-spacing:-.005em; transition:color .25s; }
.prio .p-why{ font-size:13px; color:var(--mut); margin-top:1px; }
.prio.done .p-title{ color:var(--faint); text-decoration:line-through; text-decoration-thickness:1px; }
.prio.done .p-why{ color:var(--faint); }
.prio .p-glyph{ margin-left:auto; color:var(--faint); flex:0 0 auto; }
.prio .p-glyph svg{ width:16px; height:16px; }
.card.stack{ padding:2px 2px; }

/* ---------- timeline ---------- */
.timeline{ position:relative; padding:6px 0 4px 2px; }
.tl-item{ position:relative; display:flex; gap:16px; padding:11px 0; }
.tl-item .t{
  flex:0 0 52px; text-align:right; font-size:13px; font-weight:600; color:var(--mut);
  font-variant-numeric:tabular-nums; padding-top:2px; letter-spacing:-.01em;
}
.tl-item .rail{ flex:0 0 10px; position:relative; }
.tl-item .rail::before{
  content:""; position:absolute; left:4.5px; top:-13px; bottom:-13px; width:1px; background:var(--line);
}
.tl-item:first-child .rail::before{ top:8px; }
.tl-item:last-child .rail::before{ bottom:auto; height:20px; }
.tl-item .dot{
  position:absolute; top:7px; left:1px; width:8px; height:8px; border-radius:50%;
  background:var(--paper); border:1.5px solid var(--faint);
}
.tl-item.now .dot{ background:var(--blue); border-color:var(--blue); }
.tl-item.past .dot{ background:var(--stone-2); border-color:var(--stone-2); }
.tl-item .tl-body{ flex:1; min-width:0; padding-bottom:2px; }
.tl-item .tl-title{ font-size:15px; font-weight:590; letter-spacing:-.005em; }
.tl-item.past .tl-title{ color:var(--mut); font-weight:500; }
.tl-item .tl-sub{ font-size:13px; color:var(--mut); margin-top:1px; }
.tl-item .tl-note{
  display:inline-flex; align-items:center; gap:6px; margin-top:7px;
  font-size:12.5px; color:var(--blue-ink); background:var(--blue-bg);
  padding:4px 10px; border-radius:8px; font-weight:500;
}
.tl-item .tl-note.sage{ color:#4C5B44; background:var(--sage-bg); }
.tl-item .tl-note.amber{ color:#7A5620; background:var(--amber-bg); }
.tl-item .tl-note svg{ width:12px; height:12px; }

/* ---------- insight lines (AI voice) ---------- */
.insight{
  display:flex; gap:11px; padding:13px 2px; align-items:flex-start;
}
.insight + .insight{ border-top:1px solid var(--line); }
.insight .i-dot{ flex:0 0 auto; width:6px; height:6px; border-radius:50%; margin-top:8px; background:var(--sage); }
.insight.watch .i-dot{ background:var(--amber); }
.insight.info .i-dot{ background:var(--blue); }
.insight p{ font-size:14.5px; color:var(--ink); line-height:1.5; }
.insight p .why{ display:block; font-size:13px; color:var(--mut); margin-top:2px; }

/* ---------- life areas ---------- */
.areas{ display:flex; flex-direction:column; }
.area{
  display:flex; align-items:center; gap:14px; padding:14px 16px; cursor:pointer;
  transition:background .2s;
}
.area + .area{ border-top:1px solid var(--line); }
.area:active{ background:var(--stone); }
.a-icon{
  flex:0 0 38px; width:38px; height:38px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:var(--stone); color:var(--ink-2);
}
.a-icon svg{ width:19px; height:19px; }
.a-icon.blue{ background:var(--blue-bg); color:var(--blue); }
.a-icon.sage{ background:var(--sage-bg); color:var(--sage); }
.a-icon.amber{ background:var(--amber-bg); color:var(--amber); }
.area .a-body{ flex:1; min-width:0; }
.area .a-name{ font-size:15.5px; font-weight:590; letter-spacing:-.005em; }
.area .a-sum{ font-size:13px; color:var(--mut); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.area .chev{ color:var(--faint); flex:0 0 auto; }
.chev svg{ width:15px; height:15px; }

/* ---------- missions ---------- */
.mission{ padding:17px 18px; cursor:pointer; }
.mission .m-top{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
.mission .m-name{ font-family:var(--serif); font-size:18.5px; font-weight:600; letter-spacing:-.005em; }
.mission .m-mom{ font-size:12.5px; font-weight:600; }
.m-mom.up{ color:var(--sage); }
.m-mom.steady{ color:var(--mut); }
.m-mom.low{ color:var(--amber); }
.mission .m-prog{ font-size:13.5px; color:var(--ink-2); margin-top:5px; }
.mission .m-bar{ height:3px; border-radius:2px; background:var(--stone-2); margin-top:12px; overflow:hidden; }
.mission .m-bar i{ display:block; height:100%; border-radius:2px; background:var(--blue); }
.mission .m-next{ display:flex; gap:9px; margin-top:12px; align-items:flex-start; }
.mission .m-next svg{ width:14px; height:14px; color:var(--amber); flex:0 0 auto; margin-top:2.5px; }
.mission .m-next p{ font-size:13.5px; color:var(--ink-2); line-height:1.45; }
.mission .m-next p b{ color:var(--ink); font-weight:590; }

/* ---------- push screen header ---------- */
.pushhead{
  display:flex; align-items:center; gap:6px; padding:14px 0 2px; position:sticky; top:0;
  background:linear-gradient(var(--paper) 78%, transparent); z-index:5;
}
.backbtn{
  display:flex; align-items:center; gap:3px; border:none; background:none; cursor:pointer;
  color:var(--blue); font-size:15.5px; font-family:var(--sans); padding:6px 8px 6px 0; font-weight:500;
}
.backbtn svg{ width:18px; height:18px; }

/* ---------- finance ---------- */
.big-figure{ padding:20px 18px 18px; }
.big-figure .bf-label{ font-size:13px; color:var(--mut); font-weight:600; letter-spacing:.05em; text-transform:uppercase; }
.big-figure .bf-num{ font-family:var(--serif); font-size:40px; font-weight:600; letter-spacing:-.015em; margin-top:6px; line-height:1.05; }
.big-figure .bf-delta{ font-size:13.5px; margin-top:6px; color:var(--sage); font-weight:550; }
.big-figure .bf-delta.warn{ color:var(--amber); }
.split{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
.split .card{ margin:0; }
.mini-fig .bf-label{ font-size:12px; }
.mini-fig .bf-num{ font-size:24px; margin-top:3px; font-family:var(--serif); font-weight:600; letter-spacing:-.01em; }
.mini-fig .bf-sub{ font-size:12.5px; color:var(--mut); margin-top:2px; }
.budget-row{ padding:13px 2px; }
.budget-row + .budget-row{ border-top:1px solid var(--line); }
.budget-row .b-top{ display:flex; justify-content:space-between; font-size:14.5px; }
.budget-row .b-top b{ font-weight:590; }
.budget-row .b-top span{ color:var(--mut); font-variant-numeric:tabular-nums; }
.budget-row .b-bar{ height:3px; background:var(--stone-2); border-radius:2px; margin-top:9px; overflow:hidden; }
.budget-row .b-bar i{ display:block; height:100%; border-radius:2px; background:var(--blue); }
.budget-row.watch .b-bar i{ background:var(--amber); }
.bill{ display:flex; align-items:center; gap:13px; padding:12px 2px; }
.bill + .bill{ border-top:1px solid var(--line); }
.bill .b-when{ flex:0 0 46px; text-align:center; background:var(--stone); border-radius:10px; padding:5px 0; }
.bill .b-when b{ display:block; font-size:15px; font-weight:650; letter-spacing:-.01em; }
.bill .b-when span{ font-size:10.5px; color:var(--mut); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
.bill .b-name{ font-size:14.5px; font-weight:560; }
.bill .b-sub{ font-size:12.5px; color:var(--mut); }
.bill .b-amt{ margin-left:auto; font-size:14.5px; font-weight:600; font-variant-numeric:tabular-nums; }

/* ---------- people ---------- */
.people{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.person{
  background:var(--card); border-radius:var(--r); border:1px solid rgba(35,33,28,.04);
  box-shadow:var(--shadow-soft); padding:16px 15px 14px; cursor:pointer;
}
.pavatar{
  width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:19px; font-weight:600; color:#fff; letter-spacing:.01em;
}
.person .p-name{ font-size:15.5px; font-weight:600; margin-top:11px; letter-spacing:-.005em; }
.person .p-rel{ font-size:12.5px; color:var(--mut); margin-top:1px; }
.person .p-flag{
  display:inline-flex; align-items:center; gap:5px; margin-top:10px; white-space:nowrap;
  font-size:12px; font-weight:550; padding:4px 9px; border-radius:8px;
  background:var(--stone); color:var(--ink-2);
}
.person .p-flag.warm{ background:var(--amber-bg); color:#7A5620; }
.person .p-flag.cool{ background:var(--blue-bg); color:var(--blue-ink); }
.person .p-flag.ok{ background:var(--sage-bg); color:#4C5B44; }
.person .p-flag svg{ width:11px; height:11px; }
/* person detail */
.pd-hero{ text-align:center; padding:16px 0 6px; }
.pd-hero .pavatar{ width:74px; height:74px; font-size:30px; margin:0 auto; }
.pd-hero h2{ font-family:var(--serif); font-size:26px; font-weight:600; margin-top:12px; letter-spacing:-.01em;}
.pd-hero .pd-sub{ color:var(--mut); font-size:14px; margin-top:3px; }
.kv{ display:flex; justify-content:space-between; gap:14px; padding:12px 2px; font-size:14.5px; }
.kv + .kv{ border-top:1px solid var(--line); }
.kv .k{ color:var(--mut); flex:0 0 auto; }
.kv .v{ text-align:right; font-weight:540; color:var(--ink); }
.actions-row{ display:flex; gap:8px; margin-top:14px; }
.act{
  flex:1; text-align:center; padding:11px 6px; border-radius:12px; cursor:pointer;
  background:var(--stone); color:var(--ink); font-size:13.5px; font-weight:590; border:none; font-family:var(--sans);
}
.act.primary{ background:var(--ink); color:var(--paper); }

/* ---------- journal ---------- */
.j-compose{ padding:20px 18px 16px; }
.j-compose .prompt{ font-family:var(--serif); font-size:19px; line-height:1.45; letter-spacing:-.005em; }
.j-compose .j-modes{ display:flex; gap:8px; margin-top:16px; }
.jmode{
  display:flex; align-items:center; gap:7px; border:none; cursor:pointer; font-family:var(--sans);
  background:var(--stone); border-radius:999px; padding:9px 15px; font-size:13.5px; font-weight:580; color:var(--ink);
}
.jmode.primary{ background:var(--ink); color:var(--paper); }
.jmode svg{ width:15px; height:15px; }
.jentry{ padding:16px 18px; cursor:pointer; }
.jentry .je-head{ display:flex; align-items:baseline; gap:8px; }
.jentry .je-day{ font-size:14.5px; font-weight:650; letter-spacing:-.005em; }
.jentry .je-meta{ font-size:12.5px; color:var(--mut); margin-left:auto; display:flex; align-items:center; gap:5px; }
.jentry .je-meta svg{ width:12px; height:12px; }
.jentry .je-mood{ font-size:12.5px; color:var(--mut); }
.jentry p.je-text{
  font-family:var(--serif); font-size:15.5px; line-height:1.6; color:var(--ink-2); margin-top:8px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.je-photo{
  margin-top:12px; height:120px; border-radius:12px; overflow:hidden; position:relative;
}
.je-photo .ph{ width:100%; height:100%; }
.searchbar{
  display:flex; align-items:center; gap:10px;
  background:var(--card); border:1px solid rgba(35,33,28,.05); box-shadow:var(--shadow-soft);
  border-radius:14px; padding:13px 15px; color:var(--mut); font-size:14.5px; margin-top:14px;
}
.searchbar svg{ width:16px; height:16px; flex:0 0 auto; }
.weekly{ background:var(--stone); border:none; box-shadow:none; }
.weekly .brief-tag .spark{ color:var(--sage); }
.weekly p{ font-family:var(--serif); font-size:16px; line-height:1.6; color:var(--ink); }

/* ---------- inbox ---------- */
.inb{ display:flex; gap:13px; padding:15px 16px; align-items:flex-start; }
.inb + .inb{ border-top:1px solid var(--line); }
.inb .a-icon{ flex:0 0 36px; width:36px; height:36px; }
.inb .in-title{ font-size:15px; font-weight:590; letter-spacing:-.005em; }
.inb .in-sub{ font-size:13px; color:var(--mut); margin-top:1px; line-height:1.45; }
.inb .in-ai{ font-size:13px; color:var(--blue-ink); margin-top:7px; background:var(--blue-bg); display:inline-block; padding:4px 10px; border-radius:8px; font-weight:500; }
.inb .in-acts{ display:flex; gap:14px; margin-top:9px; }
.inb .in-acts button{
  border:none; background:none; cursor:pointer; font-family:var(--sans);
  font-size:13px; font-weight:600; color:var(--blue); padding:0;
}
.inb .in-acts button.quiet{ color:var(--mut); font-weight:500; }
.handled{
  text-align:center; padding:18px 8px 6px; color:var(--mut); font-size:13px; line-height:1.6;
}

/* ---------- assistant ---------- */
.asst-card{ padding:16px 18px; }
.asst-card .a-kind{ display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.asst-card .a-kind i{ width:6px; height:6px; border-radius:50%; background:var(--blue); }
.asst-card.notice .a-kind i{ background:var(--amber); }
.asst-card.warm .a-kind i{ background:var(--sage); }
.asst-card .a-kind span{ font-size:12px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--mut); }
.asst-card p{ font-family:var(--serif); font-size:16.5px; line-height:1.55; }
.asst-card .a-act{ margin-top:12px; display:inline-flex; }
.chip-act{
  border:1px solid var(--line); background:var(--paper); border-radius:999px;
  font-size:13px; font-weight:580; color:var(--ink); padding:7px 14px; cursor:pointer; font-family:var(--sans);
}
.ask{
  position:absolute; left:16px; right:16px; bottom:calc(env(safe-area-inset-bottom) + 88px);
  display:flex; align-items:center; gap:10px; z-index:25;
  background:var(--card); border:1px solid rgba(35,33,28,.07);
  box-shadow:var(--shadow); border-radius:999px; padding:13px 18px; color:var(--mut); font-size:15px;
}
.ask svg{ width:17px; height:17px; color:var(--mut); }
.ask span{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ask .mic{ color:var(--ink-2); }

/* ---------- tab bar ---------- */
.tabbar{
  position:absolute; left:0; right:0; bottom:0; z-index:35;
  display:flex; padding:10px 8px calc(env(safe-area-inset-bottom) + 14px);
  background:color-mix(in srgb, var(--paper) 84%, transparent);
  -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px);
  border-top:1px solid var(--line);
}
.tabbar button{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; cursor:pointer; color:var(--faint); font-family:var(--sans);
  transition:color .2s;
}
.tabbar button svg{ width:23px; height:23px; }
.tabbar button span{ font-size:10px; font-weight:600; letter-spacing:.01em; }
.tabbar button.on{ color:var(--ink); }
.tabbar button .badge{

/* ============ router ============ */
const TABS = [
  ['today','Today',ic.sun],
  ['life','Life',ic.leaf],
  ['journal','Journal',ic.book],
  ['inbox','Inbox',ic.tray,5],
  ['assistant','Assistant',ic.spark],
];
const PUSH = { health:'life', finance:'life', people:'life', alex:'people' };
const stage = document.getElementById('stage');
const tabbar = document.getElementById('tabbar');

Object.keys(S).forEach(k => {
  const el = document.createElement('div');
  el.className = 'screen' + (PUSH[k] ? ' push' : '');
  el.id = 'sc-' + k;
  el.innerHTML = S[k];
  stage.appendChild(el);
});
/* assistant ask bar lives outside the scroll so it floats */
const ask = document.createElement('div');
ask.className = 'ask'; ask.id = 'askbar'; ask.style.display = 'none';
ask.innerHTML = ic.search + '<span>Ask about anything in your life…</span><span class="mic">' + ic.mic + '</span>';
stage.appendChild(ask);

tabbar.innerHTML = TABS.map(([k,label,icon,badge]) =>
  `<button data-tab="${k}">${badge?`<span class="badge">${badge}</span>`:''}${icon}<span>${label}</span></button>`).join('');

let tab = 'today', pushed = [];
function paint(){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  const top = pushed.length ? pushed[pushed.length-1] : tab;
  document.getElementById('sc-'+top).classList.add('on');
  if (pushed.length) document.getElementById('sc-'+tab).classList.add('on'); /* keep base under push */
  document.querySelectorAll('.tabbar button').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  document.getElementById('askbar').style.display = (top === 'assistant') ? 'flex' : 'none';
}
tabbar.addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  if (tab === b.dataset.tab && pushed.length){ pushed = []; }
  tab = b.dataset.tab; pushed = []; paint();
  document.getElementById('sc-'+tab).scrollTop = 0;
});
stage.addEventListener('click', e => {
  const p = e.target.closest('[data-push]');
  if (p){ pushed.push(p.dataset.push); paint();
    document.getElementById('sc-'+p.dataset.push).scrollTop = 0; return; }
  if (e.target.closest('[data-back]')){ pushed.pop(); paint(); return; }
  const pr = e.target.closest('.prio');
  if (pr) pr.classList.toggle('done');
});
paint();
</script>
